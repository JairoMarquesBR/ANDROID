name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite disparar a compilação manualmente pelo painel do GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-size: 'large'
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Web Frontend (Vite/React)
        run: npm run build

      - name: Sync Web Code to Native Android (Capacitor)
        run: npx cap sync android

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Compile Native Android APK (Debug Mode)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Compiled APK to Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Deck-Alpha-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
